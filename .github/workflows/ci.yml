name: CI Build

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: '25'
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/buildscript.properties
            **/gradle-wrapper.properties
            **/gradle.lockfile
            src/main/resources/hbm_at.cfg

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew releaseBuild

      - name: Prepare artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          OUT_DIR="build/artifact-upload"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          for file in build/libs/*; do
            name=$(basename "$file")
            case "$name" in
              *-downgraded.jar|*-dev-shadow.jar)
                continue
                ;;
            esac
            cp "$file" "$OUT_DIR/$name"
          done

          for file in build/publication-libs/*.jar; do
            name=$(basename "$file")
            if [[ "$name" != *-java25-publish-* ]]; then
              echo "::error::Unexpected publication artifact name: $name"
              exit 1
            fi

            prefix="${name%%-java25-publish-*}"
            rest="${name#*-java25-publish-}"

            case "$rest" in
              *-dev-compile.jar)
                continue
                ;;
              *-api.jar)
                continue
                ;;
              *.jar)
                version="${rest%.jar}"
                compat_name="${prefix}-${version}-java25.jar"
                ;;
            esac
            cp "$file" "$OUT_DIR/$compat_name"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}
          path: build/artifact-upload/**
          if-no-files-found: error

      - name: Run server
        run: |
          set -euo pipefail

          mkdir -p run/server
          echo "eula=true" > run/server/eula.txt

          # Set a constant seed with a village at spawn
          printf "level-seed=-6202107849386030209\nonline-mode=true\n" > run/server/server.properties

          echo "stop" > run/server/stop.txt
          set +e
          timeout 120s ./gradlew runServer --stacktrace < run/server/stop.txt 2>&1 | tee server.log
          code=${PIPESTATUS[0]}
          set -e

          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            echo "runServer exited with code $code"
            exit "$code"
          fi

      - name: Validate server run
        run: |
          set -euo pipefail

          RUNDIR="run/server"
          CRASH="crash-reports"
          SERVERLOG="$RUNDIR/logs/latest.log"

          shopt -s nullglob

          crash_reports=("$RUNDIR/$CRASH/crash"*.txt)

          if [ "${#crash_reports[@]}" -gt 0 ]; then
            latest_crash_report="${crash_reports[-1]}"
            {
              printf 'Latest crash report detected %s:\n' "${latest_crash_report##*/}"
              cat "$latest_crash_report"
            } >&2
            exit 1
          fi

          if [ -f "$SERVERLOG" ]; then
            if grep -qF 'Fatal errors were detected' "$SERVERLOG"; then
              {
                printf 'Fatal errors detected:\n'
                cat "$SERVERLOG"
              } >&2
              exit 1
            fi

            if grep -qF 'The state engine was in incorrect state ERRORED and forced into state SERVER_STOPPED' \
              "$SERVERLOG"; then
              {
                printf 'Server force stopped:\n'
                cat "$SERVERLOG"
              } >&2
              exit 1
            fi

            if grep -qF 'Exception stopping the server' "$SERVERLOG"; then
              {
                printf "Server didn't shut down cleanly:\n"
                cat "$SERVERLOG"
              } >&2
              exit 1
            fi

            if ! grep -qP '.+Done \(.+\)\! For help, type "help" or "\?"' "$SERVERLOG"; then
              {
                printf 'Server did not finish startup:\n'
                cat "$SERVERLOG"
              } >&2
              exit 1
            fi
          else
            echo "No latest.log found at $SERVERLOG (server may not have fully started)."
          fi

          echo 'No crash reports detected'

      - name: Resolve snapshot version
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'Warfactory-Official/Hbm-s-Nuclear-Tech-CE'
        shell: bash
        run: |
          set -euo pipefail
          MOD_VERSION=$(grep -E '^\s*modVersion\s*=' gradle.properties | sed -E 's/^\s*modVersion\s*=\s*//; s/\r$//' | xargs || true)
          test -n "$MOD_VERSION"
          echo "RELEASE_VERSION=${MOD_VERSION}-SNAPSHOT" >> "$GITHUB_ENV"

      - name: Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'Warfactory-Official/Hbm-s-Nuclear-Tech-CE'
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_URL: https://repo.warfactory.co/snapshots
        run: |
          ./gradlew \
            publishMavenPublicationToMavenRepository \
            publishMavenJava25PublicationToMavenRepository \
            --parallel \
            --max-workers=2 \
            --no-daemon \
            --stacktrace
